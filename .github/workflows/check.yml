name: PR Quality Check

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - clean-ci-setup # 自分の作業ブランチでも動くように追加

jobs:
  # --- フロントエンドのチェック ---
  frontend:
    name: Frontend (Lint + TypeCheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit

  # --- バックエンドのチェック ---
  backend:
    name: Backend (Ruff + Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx # 実行に必要なツールを念押しでインストール
      - name: Ruff Check
        run: ruff check .
      - name: Pytest
        run: pytest -v
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./test.db
          # ローカルでテストを通すのに必要だった環境変数
          RAKUTEN_APP_ID: "dummy"
          RAKUTEN_ACCESS_KEY: "dummy"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
          SUPABASE_JWT_SECRET: "dummy"
          OPENAI_API_KEY: "dummy"
          RAKUTEN_AFFILIATE_ID: "dummy"
